name: echostack_plugin
description: EchoStack mobile attribution SDK for Flutter. Thin wrapper over native iOS and Android SDKs.
version: 1.0.0
homepage: https://echostack.app
repository: https://github.com/echostack/echostack-flutter

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.echostack.flutter
        pluginClass: EchoStackPlugin
      ios:
        pluginClass: EchoStackPlugin
